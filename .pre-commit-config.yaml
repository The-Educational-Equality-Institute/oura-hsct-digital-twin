repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: debug-statements
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-em-dash
        name: No em dashes (use hyphen instead)
        entry: bash -c 'if grep -Prn "\x{2014}" "$@" 2>/dev/null; then echo "ERROR: Em dashes found. Replace with hyphens (-)."; exit 1; fi' --
        language: system
        types_or: [python, markdown, json]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
