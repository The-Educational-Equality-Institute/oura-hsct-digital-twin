name: Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate config.py with patient dates
        run: |
          cp config.example.py config.py
          python -c "
          import re
          c = open('config.py').read()
          replacements = {
              'TRANSPLANT_DATE = date(2023, 1, 1)': 'TRANSPLANT_DATE = date(2023, 11, 23)',
              'TREATMENT_START = date(2026, 1, 15)': 'TREATMENT_START = date(2026, 3, 16)',
              'KNOWN_EVENT_DATE = date(2026, 1, 10)': 'KNOWN_EVENT_DATE = date(2026, 2, 9)',
              'HEV_DIAGNOSIS_DATE = None': 'HEV_DIAGNOSIS_DATE = date(2026, 3, 18)',
              'DATA_START = date(2025, 12, 1)': 'DATA_START = date(2026, 1, 8)',
              'PATIENT_AGE = 40': 'PATIENT_AGE = 36',
              'PATIENT_LABEL = \"Patient\"': 'PATIENT_LABEL = \"Post-HSCT Patient\"',
          }
          for old, new in replacements.items():
              c = c.replace(old, new)
          open('config.py', 'w').write(c)
          print('config.py generated with patient-specific dates')
          "

      - name: Create data directory
        run: mkdir -p data

      # --- OAuth2 Token Refresh + Import ---
      - name: Refresh token and import data
        env:
          OURA_CLIENT_ID: ${{ secrets.OURA_CLIENT_ID }}
          OURA_CLIENT_SECRET: ${{ secrets.OURA_CLIENT_SECRET }}
          OURA_REFRESH_TOKEN: ${{ secrets.OURA_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          DATABASE_PATH: data/oura.db
        run: |
          python -c "
          import os, requests

          resp = requests.post('https://api.ouraring.com/oauth/token', data={
              'grant_type': 'refresh_token',
              'refresh_token': os.environ['OURA_REFRESH_TOKEN'],
              'client_id': os.environ['OURA_CLIENT_ID'],
              'client_secret': os.environ['OURA_CLIENT_SECRET'],
          }, timeout=30)

          if resp.status_code != 200:
              print(f'Token refresh failed: {resp.status_code} {resp.text}')
              exit(1)

          tokens = resp.json()
          access_token = tokens['access_token']
          new_refresh = tokens.get('refresh_token', '')

          # Write tokens to .env (never to step outputs)
          with open('.env', 'w') as f:
              f.write(f'OURA_ACCESS_TOKEN={access_token}\n')
          os.chmod('.env', 0o600)

          # Store new refresh token for secret rotation
          if new_refresh:
              with open('.new_refresh_token', 'w') as f:
                  f.write(new_refresh)
              os.chmod('.new_refresh_token', 0o600)

          print(f'Token refreshed: access={len(access_token)} chars, refresh={len(new_refresh)} chars')
          "

          # Rotate refresh token secret if a new one was issued
          if [ -f .new_refresh_token ]; then
            gh secret set OURA_REFRESH_TOKEN \
              --body "$(cat .new_refresh_token)" \
              --repo ${{ github.repository }}
            rm -f .new_refresh_token
          fi

      # --- Import Oura Data ---
      # DB is created fresh each run, so import the full analysis window
      - name: Import Oura data (full range)
        env:
          DATABASE_PATH: data/oura.db
        run: python api/import_oura.py --start 2026-01-08 --end $(date -u +%Y-%m-%d)

      # --- Run Analysis Pipeline ---
      - name: Run all analysis scripts
        env:
          DATABASE_PATH: data/oura.db
        run: python run_all.py

      # --- Commit updated database back to repo ---
      - name: Commit updated database
        continue-on-error: true
        run: |
          cp data/oura.db data/demo.db
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/demo.db
          if git diff --cached --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "auto: update demo.db $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # --- Upload reports as artifact ---
      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ github.run_number }}
          path: |
            reports/*.html
            reports/*.json
          retention-days: 30

      # --- Deploy to Cloudflare Pages via Astro landing page ---
      # The Astro site at digital-twin-site owns the root URL.
      # Reports are synced into public/reports/, then built and deployed together.
      - name: Clone Astro landing page site
        if: success()
        run: |
          gh repo clone The-Educational-Equality-Institute/digital-twin-site /tmp/digital-twin-site -- --depth 1 || true
          if [ ! -d /tmp/digital-twin-site ]; then
            echo "Could not clone digital-twin-site repo, falling back to reports-only deploy"
            echo "ASTRO_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "ASTRO_AVAILABLE=true" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}

      - name: Deploy via Astro site
        if: success() && env.ASTRO_AVAILABLE == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping Cloudflare deploy (CLOUDFLARE_API_TOKEN not configured)"
            exit 0
          fi

          cd /tmp/digital-twin-site
          npm ci

          # Sync fresh reports into the Astro site
          mkdir -p public/reports
          for f in $GITHUB_WORKSPACE/reports/*.html; do
            [ -f "$f" ] && cp "$f" public/reports/
          done
          for f in $GITHUB_WORKSPACE/reports/*.json; do
            [ -f "$f" ] && cp "$f" public/reports/
          done

          # Remove any index.html from reports (landing page is index.astro)
          rm -f public/reports/index.html

          npx astro build
          npm install -g wrangler

          wrangler pages deploy dist \
            --project-name=digital-twin \
            --branch=main \
            --commit-dirty=true

      - name: Deploy reports only (fallback)
        if: success() && env.ASTRO_AVAILABLE == 'false'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skipping Cloudflare deploy (CLOUDFLARE_API_TOKEN not configured)"
            exit 0
          fi

          echo "WARNING: Deploying reports without Astro landing page"
          npm install -g wrangler

          mkdir -p deploy
          cp reports/*.html deploy/ 2>/dev/null || true
          cp reports/*.json deploy/ 2>/dev/null || true
          rm -f deploy/index.html

          wrangler pages deploy deploy \
            --project-name=digital-twin \
            --branch=main \
            --commit-dirty=true
